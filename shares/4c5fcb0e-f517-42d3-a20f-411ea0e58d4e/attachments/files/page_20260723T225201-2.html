<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test sub page</title>
    <style>:root {
  --paper: #f8f4e8;
  --ink: #171819;
  --muted: #6f685d;
  --line: #d7cdb9;
  --accent: #1d5b49;
  --accent-soft: #d7ebe1;
  --callout: #fff2ca;
  --code: #162026;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top left, rgba(29, 91, 73, 0.16), transparent 35%),
    linear-gradient(180deg, #f6f1e3 0%, #fcfbf7 100%);
  color: var(--ink);
  font-family: "Iowan Old Style", "Palatino Linotype", serif;
}

.page-shell {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 20px 96px;
}

.hero {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 18px;
  align-items: center;
  border: 1px solid rgba(215, 205, 185, 0.8);
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.7);
  padding: 24px;
  overflow: hidden;
}

.hero-accent {
  position: absolute;
  inset: auto -80px -80px auto;
  width: 200px;
  height: 200px;
  border-radius: 999px;
  background: linear-gradient(135deg, rgba(29, 91, 73, 0.22), rgba(29, 91, 73, 0));
}

.icon {
  margin: 0;
  font-size: 42px;
}

.eyebrow {
  margin: 0 0 6px;
  color: var(--muted);
  font-family: "Segoe UI", sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.hero h1 {
  margin: 0;
  font-size: clamp(30px, 5vw, 52px);
  line-height: 0.95;
}

.meta {
  margin: 10px 0 0;
  color: var(--muted);
  font-family: "Segoe UI", sans-serif;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 18px 0 28px;
}

.tag {
  padding: 7px 12px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-family: "Segoe UI", sans-serif;
  font-size: 12px;
  font-weight: 600;
}

.page-body {
  display: grid;
  gap: 18px;
}

p,
li,
blockquote,
summary,
td,
.embed-placeholder,
.todo span {
  font-size: 18px;
  line-height: 1.65;
}

h1,
h2,
h3 {
  margin: 14px 0 2px;
  line-height: 1.05;
}

h2 {
  font-size: 32px;
}

h3 {
  font-size: 24px;
}

blockquote {
  margin: 0;
  padding-left: 16px;
  border-left: 4px solid var(--accent);
  color: #2f413b;
}

.callout {
  padding: 16px 18px;
  border-left: 4px solid #d09b25;
  border-radius: 18px;
  background: var(--callout);
}

.todo {
  display: flex;
  align-items: center;
  gap: 12px;
}

details {
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.65);
}

summary {
  cursor: pointer;
  font-weight: 700;
}

.embed-placeholder {
  border: 1px dashed #a99571;
  border-radius: 18px;
  background: #f4ecdb;
  padding: 18px;
}

.columns {
  display: grid;
  gap: 16px;
}

.column {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.72);
}

.columns-2 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.columns-3 {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.columns-4 {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.columns-5 {
  grid-template-columns: repeat(5, minmax(0, 1fr));
}

table {
  width: 100%;
  border-collapse: collapse;
  overflow: hidden;
  border-radius: 18px;
}

td {
  border: 1px solid var(--line);
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.8);
}

hr {
  width: 100%;
  border: none;
  border-top: 1px solid var(--line);
}

img {
  max-width: 100%;
  display: block;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
}

figure {
  margin: 0;
  display: grid;
  gap: 8px;
}

figcaption {
  color: var(--muted);
  font-family: "Segoe UI", sans-serif;
}

pre {
  margin: 0;
  padding: 18px;
  border-radius: 22px;
  background: var(--code);
  color: #f5f1e5;
  overflow: auto;
}

a {
  color: var(--accent);
}

@media (max-width: 740px) {
  .page-shell {
    padding: 24px 14px 72px;
  }

  .hero {
    grid-template-columns: 1fr;
  }

  .columns {
    grid-template-columns: 1fr;
  }
}</style>
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <div class="hero-accent"></div>
        <p class="icon">📳</p>
        <div>
          <p class="eyebrow">Offline export</p>
          <h1>test sub page</h1>
          <p class="meta">Updated 2026-07-20T13:32:45.972851</p>
        </div>
      </header>
      <section class="tag-row"></section>
      <article class="page-body">
        <div class="block-row" style="margin-bottom:12px;"><p>testing testing</p></div>
      </article>
    </main>
  </body>
</html>
